<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>HTML Preview</title>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
body {
  background: #eee;
  padding: 40px;
}

/* 캡처 영역 */
#capture {
  background: white;
  padding: 30px;
  width: 900px;
  margin: auto;
}

/* 버튼 */
button {
  position: fixed;
  top: 20px;
  right: 20px;
  padding: 10px 16px;
  background: #007bff;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}
</style>
</head>

<body>

<button onclick="savePNG()">PNG 저장</button>

<div id="capture">

<!-- 🔥 여기부터 네 기존 HTML 넣기 -->

<div style="background-color: #f8f9fa; border: 1px solid #dee2e6; border-radius: 8px; padding: 20px; font-family: sans-serif;">
<h3 style="color: #007bff; border-bottom: 2px solid #007bff; padding-bottom: 10px;">ARCH 블라인드</h3>

<!-- 기존 내용 그대로 유지 -->
<!-- 👇 너가 준 HTML 그대로 넣으면 됨 -->

</div>

</div>

<script>
function savePNG() {
  const element = document.getElementById("capture");

  html2canvas(element, {
    useCORS: true,
    scrollY: -window.scrollY,
    windowWidth: document.body.scrollWidth,
    windowHeight: document.body.scrollHeight
  }).then(canvas => {
    const link = document.createElement("a");
    link.download = "capture.png";
    link.href = canvas.toDataURL("image/png");
    link.click();
  });
}
</script>

</body>
</html>
