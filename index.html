<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PNG 파일 저장 사이트</title>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <style>
    :root{
      --bg:#eceff2;
      --bg2:#e3e7eb;
      --paper:#fcfcfb;
      --paper-soft:#f6f7f8;
      --line:#d4d9df;
      --line-strong:#bcc4cc;
      --text:#222831;
      --muted:#69707c;
      --deep:#2f3c4c;
      --accent:#60758d;
      --accent-soft:#e7edf2;
      --shadow:0 14px 34px rgba(22, 28, 36, .07);
      --radius-xl:24px;
      --radius-lg:18px;
      --radius-md:12px;
    }

    *{box-sizing:border-box;}

    html,body{
      margin:0;
      min-height:100%;
      font-family:"Pretendard","SUIT","Noto Sans KR","Apple SD Gothic Neo",sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top left, rgba(255,255,255,.7), transparent 24%),
        linear-gradient(180deg, var(--bg), var(--bg2));
    }

    body{padding:24px;}

    .wrap{
      max-width:1600px;
      margin:0 auto;
      display:grid;
      grid-template-columns:400px 1fr;
      gap:22px;
      min-height:calc(100vh - 48px);
    }

    .panel{
      background:rgba(252,252,251,.88);
      border:1px solid rgba(186,193,201,.72);
      box-shadow:var(--shadow);
      backdrop-filter:blur(8px);
      -webkit-backdrop-filter:blur(8px);
    }

    .sidebar{
      border-radius:var(--radius-xl);
      padding:28px;
      display:flex;
      flex-direction:column;
      gap:18px;
      background:linear-gradient(180deg, rgba(250,250,249,.96), rgba(243,245,247,.94));
    }

    .viewer{
      border-radius:30px;
      padding:18px;
      display:flex;
      flex-direction:column;
      gap:14px;
      min-height:calc(100vh - 48px);
      background:linear-gradient(180deg, rgba(251,251,250,.96), rgba(244,246,248,.94));
    }

    .eyebrow{
      display:inline-flex;
      width:fit-content;
      padding:7px 12px;
      border-radius:999px;
      border:1px solid var(--line);
      background:var(--paper-soft);
      color:var(--muted);
      font-size:11px;
      letter-spacing:.12em;
      text-transform:uppercase;
    }

    h1{
      margin:12px 0 10px;
      font-size:clamp(30px, 3vw, 44px);
      line-height:1.08;
      letter-spacing:-.04em;
      color:#202833;
    }

    .intro{
      margin:0;
      color:var(--muted);
      font-size:14px;
      line-height:1.8;
    }

    .box{
      background:rgba(247,247,245,.88);
      border:1px solid var(--line);
      border-radius:var(--radius-lg);
      padding:16px;
    }

    .box h2{
      margin:0 0 10px;
      font-size:13px;
      letter-spacing:.08em;
      text-transform:uppercase;
      color:#3a4450;
    }

    .file-label{
      display:block;
      width:100%;
      padding:14px 16px;
      border-radius:var(--radius-md);
      background:#fff;
      border:1px solid var(--line);
      cursor:pointer;
      transition:.2s ease;
      font-size:14px;
      color:#303744;
    }

    .file-label:hover{
      background:#fbfbfb;
      border-color:var(--line-strong);
      transform:translateY(-1px);
    }

    .file-label input{display:none;}

    .file-name{
      margin-top:10px;
      font-size:12px;
      color:var(--muted);
      word-break:break-all;
    }

    textarea{
      width:100%;
      min-height:360px;
      resize:vertical;
      border:1px solid var(--line);
      border-radius:var(--radius-md);
      background:#fcfcfb;
      color:#20262f;
      padding:16px;
      font-size:13px;
      line-height:1.7;
      font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;
    }

    .btn-row{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin-top:12px;
    }

    button{
      appearance:none;
      border:1px solid var(--line-strong);
      border-radius:999px;
      padding:13px 16px;
      font-size:14px;
      cursor:pointer;
      transition:.2s ease;
      color:#29313a;
      background:#f7f7f6;
    }

    button:hover{
      transform:translateY(-1px);
      background:#fff;
    }

    .primary{
      background:linear-gradient(180deg, #6d8298, #5c7086);
      border-color:#5c7086;
      color:#fff;
      font-weight:700;
    }

    .danger{
      background:linear-gradient(180deg, #344253, #2b3746);
      border-color:#2b3746;
      color:#fff;
      font-weight:700;
    }

    .viewer-top{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      flex-wrap:wrap;
      padding:6px 6px 8px;
    }

    .viewer-top h2{
      margin:0 0 8px;
      font-size:clamp(22px, 2.4vw, 34px);
      line-height:1.08;
      letter-spacing:-.03em;
      color:#1f2834;
    }

    .viewer-top p{
      margin:0;
      color:var(--muted);
      font-size:14px;
      line-height:1.7;
    }

    .status{
      display:none;
    }

    .preview-shell{
      flex:1;
      border-radius:22px;
      overflow:hidden;
      border:1px solid var(--line);
      background:#f7f8f9;
      min-height:780px;
      display:flex;
      flex-direction:column;
    }

    .preview-bar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:12px 16px;
      background:linear-gradient(180deg, #eff1f3, #e8ebee);
      border-bottom:1px solid var(--line);
    }

    .dots{
      display:flex;
      gap:8px;
    }

    .dots i{
      display:block;
      width:11px;
      height:11px;
      border-radius:50%;
      background:#a9b0b9;
    }

    .preview-path{
      display:none;
    }

    iframe{
      width:100%;
      flex:1;
      border:0;
      background:#fff;
      display:block;
      min-height:720px;
    }

    .foot{
      display:none;
    }

    @media (max-width:1180px){
      .wrap{grid-template-columns:1fr;}
      .viewer{min-height:auto;}
      .preview-shell{min-height:68vh;}
    }

    @media (max-width:720px){
      body{padding:14px;}
      .sidebar,.viewer{border-radius:22px;}
      .sidebar{padding:20px;}
      .viewer{padding:12px;}
      .btn-row{grid-template-columns:1fr;}
      textarea{min-height:280px;}
      .preview-shell{border-radius:18px;min-height:64vh;}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <aside class="panel sidebar">
      <div>
        <div class="eyebrow">Preview</div>
        <h1>PNG 파일 저장 사이트</h1>
        <p class="intro">HTML 파일 업로드와 직접 붙여넣기를 지원하는 미리보기 도구입니다. 오른쪽에는 사용자가 넣은 HTML이 그대로 렌더링되며, 현재 결과를 PNG로 저장할 수 있습니다.</p>
      </div>

      <section class="box">
        <h2>HTML file upload</h2>
        <label class="file-label">
          html / htm / txt 파일 선택
          <input type="file" id="fileInput" accept=".html,.htm,.txt" />
        </label>
        <div class="file-name" id="fileName">선택된 파일 없음</div>
      </section>

      <section class="box">
        <h2>HTML input</h2>
        <textarea id="htmlInput"><div style="background-color: #f8f9fa; border: 1px solid #dee2e6; border-radius: 8px; padding: 20px; font-family: sans-serif;">
    <h3 style="color: #007bff; border-bottom: 2px solid #007bff; padding-bottom: 10px;">ARCH 블라인드</h3>

    <div style="border: 1px solid #e9ecef; border-radius: 5px; margin-bottom: 15px; padding: 15px;">
        <p><small>긴급제압팀(R.S.T.)</small></p>
        <h4><b>[사내연애] R.S.T. 카르마, 유토피아 이 커플 원래 이래?</b></h4>
        <p>
            아니 점심 먹고 들어오는데<br>
            R.S.T. 휴게실 앞에서 카르마가 유토피아 벽에 밀치고 있는 거 봄;;<br>
            분위기 진짜 험악해서 뭔 일 난 줄 알았는데...<br>
            유토피아가 뭐라고 하니까 갑자기 표정 싹 풀리면서<br>
            목덜미에 얼굴 묻고 냄새 맡더라... <ins>진짜 개처럼 킁킁거렸음</ins><br>
            그러더니 '오늘 밤에 죽여버릴 줄 알아' <small>(정확한 워딩은 기억 안 나는데 암튼 이런 뉘앙스)</small> 이러고 감.<br>
            근데 유토피아는 아무렇지도 않게 웃으면서 손 흔들어주더라?<br><br>
            이 커플... 정상적인 연애 맞냐?
            <del>거의 데이트 폭력 직전 아니냐고...</del>
        </p>
        <hr>
        <small>👀 10,234 💬 12</small>
        <details>
            <summary style="cursor: pointer; color: #6c757d;">댓글보기(펼치기)</summary>
            <div style="border-top: 1px solid #f1f3f5; margin-top: 10px; padding-top: 10px;">
                <p><b>dlcksgml12:</b> 걔네 원래 그래. <mark>신경 꺼. 목숨은 소중하잖아.</mark></p>
                <p><b>ARCH_official:</b> <em>(글쓴이)</em> 아니 그래도... 너무 무서웠다고...</p>
                <p><b>dudwoaoc:</b> 죽여버린다는 게... 침대에서...?</p>
                <p><b>qweasdzxc:</b> ㄴ ㅗㅜㅑ... 🤤</p>
                <p><b>wjdtnsla:</b> 전에 폭주 센티넬 제압 현장에서 봤는데, 카르마가 센티넬 멱살 잡고 '이 개새끼가 어딜 감히 내 마누라한테 흠집을 내?' 하면서 패는 거 봄. 눈 돌아가 있던데. 유토피아가 말리니까 그제야 멈추더라. 그냥... 그들만의 세상이 있는 듯.</p>
                <p><b>gkdlfna:</b> 냄새 맡는 거 종종 목격됨. 유토피아 샴푸 뭐 쓰는지 궁금하다.</p>
                <p><b>S-class_Fan:</b> <u>그래도 우리 유토피아 님 건들면 그날로 죽는다는 거잖아... 낭만 미쳤다...</u></p>
            </div>
        </details>
    </div>
</div></textarea>

        <div class="btn-row">
          <button class="primary" id="applyBtn">미리보기 적용</button>
          <button id="sampleBtn">샘플로 되돌리기</button>
        </div>
      </section>

      <section class="box">
        <h2>Save</h2>
        <div class="btn-row">
          <button class="danger" id="saveBtn">PNG 저장</button>
          <button id="newWindowBtn">새 창으로 보기</button>
        </div>
      </section>

      <p class="foot"></p>
    </aside>

    <main class="panel viewer">
      <div class="viewer-top">
        <div>
          <h2>HTML 미리보기 버전</h2>
          <p>왼쪽에서 파일을 불러오거나 코드를 수정한 뒤 적용하면 이 영역에 바로 반영됩니다.</p>
        </div>
      </div>

      <div class="preview-shell">
        <div class="preview-bar">
          <div class="dots"><i></i><i></i><i></i></div>
          <div class="preview-path" id="previewPath"></div>
        </div>
        <iframe id="previewFrame" title="HTML Preview"></iframe>
      </div>
    </main>
  </div>

  <script>
    const fileInput = document.getElementById('fileInput');
    const fileName = document.getElementById('fileName');
    const htmlInput = document.getElementById('htmlInput');
    const applyBtn = document.getElementById('applyBtn');
    const sampleBtn = document.getElementById('sampleBtn');
    const saveBtn = document.getElementById('saveBtn');
    const newWindowBtn = document.getElementById('newWindowBtn');
    const previewFrame = document.getElementById('previewFrame');
    const previewPath = document.getElementById('previewPath');

    const sampleHTML = htmlInput.value;

    function updateStatus(text) {
      if (previewPath) previewPath.textContent = text || '';
    }

    function wrapHTML(html){
      const trimmed = html.trim().toLowerCase();
      if (trimmed.startsWith('<!doctype') || trimmed.startsWith('<html')) {
        return html;
      }
      return `<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Preview</title>
<style>
  html,body{
    margin:0;
    padding:0;
    background:#ffffff;
  }
  body{
    padding:24px;
    box-sizing:border-box;
  }
</style>
</head>
<body>
${html}
</body>
</html>`;
    }

    function renderHTML(html, label = '') {
      previewFrame.srcdoc = wrapHTML(html);
      updateStatus(label);
    }

    applyBtn.addEventListener('click', () => {
      renderHTML(htmlInput.value, '');
    });

    sampleBtn.addEventListener('click', () => {
      htmlInput.value = sampleHTML;
      renderHTML(sampleHTML, '');
      fileName.textContent = '선택된 파일 없음';
    });

    fileInput.addEventListener('change', (event) => {
      const file = event.target.files[0];
      if (!file) return;

      fileName.textContent = file.name;
      const reader = new FileReader();
      reader.onload = () => {
        const text = reader.result;
        htmlInput.value = text;
        renderHTML(text, '');
      };
      reader.readAsText(file, 'utf-8');
    });

    newWindowBtn.addEventListener('click', () => {
      const html = wrapHTML(htmlInput.value);
      const blob = new Blob([html], { type: 'text/html' });
      const url = URL.createObjectURL(blob);
      window.open(url, '_blank', 'noopener');
      setTimeout(() => URL.revokeObjectURL(url), 10000);
    });

    function waitForFrameLoad(frame) {
      return new Promise((resolve) => {
        const done = () => setTimeout(resolve, 350);
        frame.onload = done;

        const doc = frame.contentDocument || frame.contentWindow?.document;
        if (doc && doc.readyState === 'complete') done();
      });
    }

    async function saveFullPNG() {
      try {
        await waitForFrameLoad(previewFrame);

        const frameWindow = previewFrame.contentWindow;
        const frameDoc = previewFrame.contentDocument || frameWindow.document;

        if (!frameDoc || !frameDoc.documentElement || !frameDoc.body) {
          alert('미리보기가 아직 준비되지 않았습니다.');
          return;
        }

        const htmlEl = frameDoc.documentElement;
        const bodyEl = frameDoc.body;

        const oldHtmlOverflow = htmlEl.style.overflow;
        const oldBodyOverflow = bodyEl.style.overflow;
        const oldHtmlHeight = htmlEl.style.height;
        const oldBodyHeight = bodyEl.style.height;

        htmlEl.style.overflow = 'visible';
        bodyEl.style.overflow = 'visible';
        htmlEl.style.height = 'auto';
        bodyEl.style.height = 'auto';

        const fullWidth = Math.max(
          bodyEl.scrollWidth,
          bodyEl.offsetWidth,
          htmlEl.clientWidth,
          htmlEl.scrollWidth,
          htmlEl.offsetWidth
        );

        const fullHeight = Math.max(
          bodyEl.scrollHeight,
          bodyEl.offsetHeight,
          htmlEl.clientHeight,
          htmlEl.scrollHeight,
          htmlEl.offsetHeight
        );

        const originalFrameWidth = previewFrame.style.width;
        const originalFrameHeight = previewFrame.style.height;

        previewFrame.style.width = fullWidth + 'px';
        previewFrame.style.height = fullHeight + 'px';

        await new Promise(resolve => setTimeout(resolve, 200));

        const canvas = await html2canvas(bodyEl, {
          useCORS: true,
          allowTaint: true,
          backgroundColor: '#ffffff',
          scale: 2,
          width: fullWidth,
          height: fullHeight,
          windowWidth: fullWidth,
          windowHeight: fullHeight,
          scrollX: 0,
          scrollY: 0
        });

        const link = document.createElement('a');
        link.download = 'archive-preview.png';
        link.href = canvas.toDataURL('image/png');
        link.click();

        previewFrame.style.width = originalFrameWidth;
        previewFrame.style.height = originalFrameHeight;

        htmlEl.style.overflow = oldHtmlOverflow;
        bodyEl.style.overflow = oldBodyOverflow;
        htmlEl.style.height = oldHtmlHeight;
        bodyEl.style.height = oldBodyHeight;
      } catch (error) {
        console.error(error);
        alert('PNG 저장 중 오류가 발생했습니다. 외부 리소스가 많은 HTML은 일부가 다르게 저장될 수 있습니다.');
      }
    }

    saveBtn.addEventListener('click', saveFullPNG);

    renderHTML(sampleHTML, '');
  </script>
</body>
</html>
